<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Kas MWW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans">

    <div id="screen-login" class="min-h-screen flex flex-col items-center justify-center p-4 bg-teal-50">
        <img src="logo-mww-png.png" alt="Logo MWW" class="w-20 h-20 mb-3 object-contain">
        <form id="form-login" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-teal-100">
            <input type="text" id="login-username" placeholder="Username" required class="w-full p-3 mb-4 bg-slate-50 border rounded-xl text-xs font-bold">
            <div class="relative mb-6">
                <input type="password" id="login-password" placeholder="Password" id="pass-input" class="w-full p-3 bg-slate-50 border rounded-xl text-xs font-bold">
                <i id="icon-mata" class="fa-solid fa-eye absolute right-4 top-4 cursor-pointer text-slate-400" onclick="togglePassword()"></i>
            </div>
            <button type="button" onclick="prosesLogin()" class="w-full bg-teal-600 text-white font-bold p-3 rounded-xl text-xs uppercase">MASUK</button>
        </form>
    </div>

    <div id="screen-dashboard" class="hidden min-h-screen p-4">
        <div class="bg-teal-600 text-white p-6 rounded-2xl mb-6 shadow-lg">
            <h2 class="text-lg font-bold">Dashboard Keuangan</h2>
            <div class="flex justify-between mt-4">
                <div><p class="text-xs opacity-75">Saldo Awal</p><p id="saldoAwal" class="font-bold">Rp 0</p></div>
                <div><p class="text-xs opacity-75">Saldo Akhir</p><p id="saldoAkhir" class="font-bold">Rp 0</p></div>
            </div>
        </div>
        
        <div class="bg-white p-6 rounded-2xl shadow-md">
            <h3 class="font-bold mb-4">Tambah Transaksi</h3>
            <input type="text" id="uraian" placeholder="Uraian" class="w-full p-3 mb-2 bg-slate-50 border rounded-xl">
            <input type="number" id="debit" placeholder="Debit" class="w-full p-3 mb-2 bg-slate-50 border rounded-xl">
            <input type="number" id="kredit" placeholder="Kredit" class="w-full p-3 mb-4 bg-slate-50 border rounded-xl">
            <button onclick="simpanTransaksi()" class="w-full bg-teal-600 text-white p-3 rounded-xl font-bold">SIMPAN</button>
        </div>
    </div>

    <script>
        function togglePassword() {
            var x = document.getElementById("pass-input");
            x.type = (x.type === "password") ? "text" : "password";
        }

        function prosesLogin() {
            var u = document.getElementById('login-username').value;
            var p = document.getElementById('login-password').value;
            google.script.run.withSuccessHandler(function(valid) {
                if(valid) {
                    document.getElementById('screen-login').classList.add('hidden');
                    document.getElementById('screen-dashboard').classList.remove('hidden');
                    loadData();
                } else { alert("User/Pass Salah"); }
            }).cekLogin(u, p);
        }

        function loadData() {
            google.script.run.withSuccessHandler(function(data) {
                document.getElementById('saldoAwal').innerText = "Rp " + data.awal;
                document.getElementById('saldoAkhir').innerText = "Rp " + data.akhir;
            }).getDashboardData();
        }

        function simpanTransaksi() {
            var data = { uraian: document.getElementById('uraian').value, debit: document.getElementById('debit').value, kredit: document.getElementById('kredit').value };
            google.script.run.withSuccessHandler(function() { alert("Tersimpan!"); loadData(); }).inputTransaksi(data);
        }
    </script>
</body>
</html>
