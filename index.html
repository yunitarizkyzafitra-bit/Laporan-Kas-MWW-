<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Kas DPW Muslimah Wahdah Wilayah Sulawesi Tengah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 font-sans">

    <div id="screen-login" class="min-h-screen flex flex-col items-center justify-center p-4 bg-teal-50">
        <img src="logo-mww-png.png" alt="Logo MWW" class="w-20 h-20 mb-3 object-contain">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-teal-100">
            <input type="text" id="login-username" placeholder="Username" class="w-full p-3 mb-4 bg-slate-50 border rounded-xl text-xs font-bold">
            <div class="relative mb-6">
                <input type="password" id="login-password" placeholder="Password" class="w-full p-3 bg-slate-50 border rounded-xl text-xs font-bold">
                <i id="icon-mata" class="fa-solid fa-eye absolute right-4 top-4 cursor-pointer text-slate-400" onclick="togglePassword()"></i>
            </div>
            <button type="button" onclick="prosesLogin()" class="w-full bg-teal-600 text-white font-bold p-3 rounded-xl text-xs uppercase">MASUK</button>
        </div>
    </div>

    <div id="screen-dashboard" class="hidden p-6 bg-slate-50 min-h-screen">
        <div class="bg-teal-700 text-white p-6 rounded-2xl mb-6">
            <p class="text-sm opacity-80">Saldo Kas Saat Ini</p>
            <h2 id="totalSaldo" class="text-3xl font-bold">Rp 0</h2>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-md mb-6">
            <h3 class="font-bold mb-4">Tambah Transaksi</h3>
            <input type="text" id="uraian" placeholder="Uraian" class="w-full p-3 mb-2 bg-slate-50 border rounded-xl">
            <input type="text" id="keterangan" placeholder="Keterangan" class="w-full p-3 mb-2 bg-slate-50 border rounded-xl">
            <input type="number" id="debit" placeholder="Debit" class="w-full p-3 mb-2 bg-slate-50 border rounded-xl">
            <input type="number" id="kredit" placeholder="Kredit" class="w-full p-3 mb-4 bg-slate-50 border rounded-xl">
            <button onclick="simpan()" class="w-full bg-teal-600 text-white p-3 rounded-xl font-bold">SIMPAN TRANSAKSI</button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-md">
            <h3 class="font-bold mb-4">Log Transaksi</h3>
            <table class="w-full text-xs">
                <thead><tr><th>Uraian</th><th>Ket</th><th>Debit</th><th>Kredit</th></tr></thead>
                <tbody id="tabelLog"></tbody>
            </table>
            <button onclick="exportPDF()" class="w-full mt-4 bg-red-600 text-white p-3 rounded-xl font-bold">EXPORT PDF</button>
        </div>
    </div>

    <script>
        function togglePassword() {
            var x = document.getElementById("login-password");
            x.type = (x.type === "password") ? "text" : "password";
        }

        function prosesLogin() {
            var u = document.getElementById('login-username').value;
            var p = document.getElementById('login-password').value;
            
            // Indikator tombol ditekan
            alert("Memproses login..."); 

            google.script.run
            .withFailureHandler(function(msg) { alert("Error: " + msg); })
            .withSuccessHandler(function(valid) {
                if(valid) {
                    document.getElementById('screen-login').classList.add('hidden');
                    document.getElementById('screen-dashboard').classList.remove('hidden');
                    loadDashboard();
                } else { alert("Username atau Password salah!"); }
            }).cekLogin(u, p);
        }

        function loadDashboard() {
            google.script.run.withSuccessHandler(function(data) {
                document.getElementById('totalSaldo').innerText = "Rp " + data.saldo;
                var tbody = document.getElementById('tabelLog');
                tbody.innerHTML = "";
                data.transaksi.forEach(row => {
                    tbody.innerHTML += `<tr><td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td></tr>`;
                });
            }).getDashboardData();
        }

        function simpan() {
            var data = { uraian: document.getElementById('uraian').value, keterangan: document.getElementById('keterangan').value, debit: document.getElementById('debit').value, kredit: document.getElementById('kredit').value };
            google.script.run.withSuccessHandler(function() { alert("Tersimpan!"); loadDashboard(); }).inputTransaksi(data);
        }

        function exportPDF() {
            alert("Sedang membuat PDF...");
            google.script.run.withSuccessHandler(function(url) { window.open(url, '_blank'); }).createPDF();
        }
    </script>
</body>
</html>
