<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Kas DPW Muslimah Wahdah Wilayah Sulawesi Tengah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans">

    <div id="screen-login" class="min-h-screen flex flex-col items-center justify-center p-4 bg-teal-50">
        <img src="https://https://drive.google.com/file/d/1xa2-Xqoxh6gRi9rIbXhWFNqpAB-etiuZ/view?usp=sharing" alt="Logo MWW" class="w-20 h-20 mb-3 object-contain">
        <form id="form-login" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-teal-100">
            <input type="text" id="login-username" placeholder="Username" required class="w-full p-3 mb-4 bg-slate-50 border rounded-xl text-xs font-bold">
            <div class="relative mb-6">
                <input type="password" id="login-password" placeholder="Password" id="passInput" class="w-full p-3 bg-slate-50 border rounded-xl text-xs font-bold">
                <i id="icon-mata" class="fa-solid fa-eye absolute right-4 top-4 cursor-pointer text-slate-400" onclick="togglePassword()"></i>
            </div>
            <button type="submit" class="w-full bg-teal-600 text-white font-bold p-3 rounded-xl text-xs uppercase">MASUK</button>
        </form>
    </div>

    <script>
        function togglePassword() {
            var x = document.getElementById("passInput");
            var icon = document.getElementById("icon-mata");
            if (x.type === "password") {
                x.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                x.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

       document.getElementById('form-login').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // TEPAT DI SINI:
            // Setelah proses pengecekan (atau setelah alert), 
            // tambahkan perintah navigasi ini:
            
            window.location.href = "dashboard.html"; 
            
        });
    </script>
</body>
</html>
</html>
