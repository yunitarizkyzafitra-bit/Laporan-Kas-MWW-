<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Profesional - MWW Sulteng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        if (!sessionStorage.getItem("isLoggedIn")) window.location.href = "index.html";
        const API_URL = "https://script.google.com/macros/s/AKfycbzyC37fZiOi8d45XNq9Cu_iN5EuIhQRUR73N8pAfO0LiesgWgADHKvdfOKzS6vDuMKGfQ/exec";
    </script>
</head>
<body class="bg-slate-50 flex min-h-screen">
    <aside class="w-72 bg-teal-800 text-white p-8 flex flex-col shadow-2xl">
        <div class="text-center mb-12">
            <img src="https://raw.githubusercontent.com/yunitarizkyzafitra-bit/Laporan-Kas-MWW-/main/logo-mww.png" class="w-20 mx-auto mb-4 bg-white p-2 rounded-2xl shadow-xl">
            <h2 class="font-bold text-lg">MWW Sulteng</h2>
        </div>
        <nav class="space-y-3 flex-grow">
            <a href="#" class="block p-4 bg-teal-900 rounded-2xl font-semibold"><i class="fa fa-chart-line mr-3"></i> Dashboard</a>
            <a href="#input-section" class="block p-4 hover:bg-teal-700 rounded-2xl transition"><i class="fa fa-plus-circle mr-3"></i> Tambah Kas</a>
        </nav>
        <button onclick="sessionStorage.clear(); window.location.href='index.html';" class="text-red-300 hover:text-white transition mt-auto"><i class="fa fa-sign-out mr-2"></i> Logout</button>
    </aside>

    <main class="flex-1 p-10">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold text-teal-950">Laporan Kas MWW</h1>
            <button onclick="exportPDF()" class="bg-teal-900 text-white px-6 py-3 rounded-xl hover:bg-teal-800 transition"><i class="fa fa-file-pdf mr-2"></i> Export PDF</button>
        </div>

        <div class="mb-6">
            <select id="bulanFilter" onchange="loadRiwayat(1)" class="p-3 bg-white border border-teal-200 rounded-xl text-teal-900 font-bold cursor-pointer"></select>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                <table class="w-full text-left">
                    <tr><td>Saldo Awal</td><td class="text-right font-bold">16,152,981</td></tr>
                    <tr class="text-green-700"><td>Total Kredit</td><td id="val-kredit" class="text-right font-bold">0</td></tr>
                    <tr class="text-red-700"><td>Total Debit</td><td id="val-debit" class="text-right font-bold">0</td></tr>
                    <tr class="bg-teal-900 text-white p-4 rounded-xl"><td>Saldo Akhir</td><td id="val-akhir" class="text-right font-bold">0</td></tr>
                </table>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100"><canvas id="kasChart"></canvas></div>
        </div>

        <div id="input-section" class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 mb-10">
            <h3 class="font-bold text-xl mb-6 text-teal-900">Input Transaksi Baru</h3>
            <form id="form-transaksi" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <input type="date" id="tgl" required class="p-4 bg-slate-50 rounded-xl border">
                <input type="text" id="uraian" placeholder="Uraian" required class="p-4 bg-slate-50 rounded-xl border">
                <input type="text" id="ket" placeholder="Keterangan" required class="p-4 bg-slate-50 rounded-xl border">
                <select id="jenis" class="p-4 bg-slate-50 rounded-xl border"><option value="Kredit">Kredit</option><option value="Debit">Debit</option></select>
                <input type="number" id="jml" placeholder="Jumlah" required class="p-4 bg-slate-50 rounded-xl border">
                <button type="submit" id="btn-save" class="bg-teal-800 text-white rounded-xl font-bold hover:bg-teal-900 transition">SIMPAN DATA</button>
            </form>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
            <input type="text" id="searchInput" onkeyup="filterTabel()" placeholder="Cari Uraian..." class="w-full p-4 mb-4 border rounded-xl">
            <table class="w-full text-left">
                <thead><tr class="border-b text-slate-500"><th class="p-3">Tanggal</th><th class="p-3">Uraian</th><th class="p-3">Keterangan</th><th class="p-3">Debit</th><th class="p-3">Kredit</th></tr></thead>
                <tbody id="tabel-riwayat"></tbody>
                <tfoot class="bg-slate-100 font-bold"><tr class="border-t"><td colspan="3" class="p-3 text-right">TOTAL</td><td id="total-debit" class="p-3 text-red-600">Rp 0</td><td id="total-kredit" class="p-3 text-green-600">Rp 0</td></tr></tfoot>
            </table>
            <div id="pagination" class="flex justify-center gap-2 mt-6"></div>
        </div>
    </main>

    <script>
        const daftarBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const select = document.getElementById('bulanFilter');
        daftarBulan.forEach((m, i) => { select.innerHTML += `<option value="${i+1}">${m} 2026</option>`; });
        select.value = new Date().getMonth() + 1;

        let kasChart = new Chart(document.getElementById('kasChart').getContext('2d'), { type: 'bar', data: { labels: ['Kredit', 'Debit'], datasets: [{ data: [0, 0], backgroundColor: ['#15803d', '#be123c'] }] } });

        async function loadRiwayat(page = 1) {
            const bulan = document.getElementById('bulanFilter').value;
            const res = await fetch(`${API_URL}?action=getRiwayat&page=${page}&bulan=${bulan}`);
            const resData = await res.json();
            let sumD = 0, sumK = 0;
            document.getElementById('tabel-riwayat').innerHTML = resData.data.map(row => {
                sumD += parseFloat(row[3] || 0); sumK += parseFloat(row[4] || 0);
                return `<tr class="border-b"><td class="p-3">${row[0]}</td><td class="p-3">${row[1]}</td><td class="p-3">${row[2]}</td><td class="p-3 text-red-600">${row[3]?Number(row[3]).toLocaleString():'-'}</td><td class="p-3 text-green-600">${row[4]?Number(row[4]).toLocaleString():'-'}</td></tr>`;
            }).join('');
            
            document.getElementById('total-debit').innerText = 'Rp ' + sumD.toLocaleString();
            document.getElementById('total-kredit').innerText = 'Rp ' + sumK.toLocaleString();
            document.getElementById('val-debit').innerText = sumD.toLocaleString();
            document.getElementById('val-kredit').innerText = sumK.toLocaleString();
            
            kasChart.data.datasets[0].data = [sumK, sumD];
            kasChart.update();
            
            const pagDiv = document.getElementById('pagination');
            pagDiv.innerHTML = Array.from({length: resData.total}, (_, i) => i + 1)
                .map(p => `<button onclick="loadRiwayat(${p})" class="px-4 py-2 ${p===page?'bg-teal-900':'bg-teal-700'} text-white rounded-lg mx-1">${p}</button>`).join('');
        }

        async function exportPDF() {
            const { jsPDF } = window.jspdf;
            const canvas = await html2canvas(document.querySelector('main'), { scale: 2 });
            const pdf = new jsPDF('p', 'mm', 'a4');
            const w = pdf.internal.pageSize.getWidth();
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, w, (canvas.height * w) / canvas.width);
            pdf.save("Laporan_Kas_MWW.pdf");
        }

        document.getElementById('form-transaksi').onsubmit = (e) => {
            e.preventDefault();
            const fd = new FormData();
            fd.append('tgl', document.getElementById('tgl').value);
            fd.append('uraian', document.getElementById('uraian').value);
            fd.append('ket', document.getElementById('ket').value);
            fd.append('jenis', document.getElementById('jenis').value);
            fd.append('jml', document.getElementById('jml').value);
            fetch(API_URL, {method: 'POST', body: fd}).then(() => { alert("Berhasil!"); location.reload(); });
        };

        function filterTabel() {
            let input = document.getElementById("searchInput").value.toLowerCase();
            let tr = document.getElementById("tabel-riwayat").getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) { tr[i].style.display = tr[i].getElementsByTagName("td")[1].innerText.toLowerCase().indexOf(input) > -1 ? "" : "none"; }
        }

        loadRiwayat();
    </script>
</body>
</html>
