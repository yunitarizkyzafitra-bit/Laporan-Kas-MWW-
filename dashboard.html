<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // Proteksi sesi tanpa mengganggu alur login
        if (!sessionStorage.getItem("isLoggedIn")) window.location.href = "index.html";
    </script>
</head>
<body class="bg-slate-50 flex min-h-screen">
    <!-- Sidebar Mewah -->
    <aside class="w-72 bg-teal-800 text-white p-8 flex flex-col shadow-2xl">
        <div class="text-center mb-12">
            <img src="https://raw.githubusercontent.com/yunitarizkyzafitra-bit/Laporan-Kas-MWW-/main/logo-mww.png" class="w-20 mx-auto mb-4 bg-white p-2 rounded-2xl shadow-xl">
            <h2 class="font-bold text-lg">MWW Sulteng</h2>
        </div>
        <nav class="space-y-3 flex-grow">
            <a href="#" class="block p-4 bg-teal-900 rounded-2xl font-semibold"><i class="fa fa-chart-line mr-3"></i> Dashboard</a>
            <a href="#input-section" class="block p-4 hover:bg-teal-700 rounded-2xl transition"><i class="fa fa-plus-circle mr-3"></i> Tambah Kas</a>
        </nav>
        <button onclick="sessionStorage.clear(); window.location.href='index.html';" class="text-red-300 hover:text-white transition mt-auto"><i class="fa fa-sign-out mr-2"></i> Logout</button>
    </aside>

    <!-- Content Utama -->
    <main class="flex-1 p-10">
        <h1 class="text-3xl font-extrabold text-teal-950 mb-8">Laporan Kas Mei 2026</h1>

        <!-- Tabel Log Otomatis -->
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 mb-10">
            <table class="w-full text-left border-separate border-spacing-y-4">
                <tr class="bg-slate-50 p-4 rounded-xl"><td>Saldo Awal</td><td class="text-right font-bold">16,152,981</td></tr>
                <tr class="bg-green-50 text-green-700 p-4 rounded-xl"><td>Total Kredit</td><td class="text-right font-bold">47,863,000</td></tr>
                <tr class="bg-red-50 text-red-700 p-4 rounded-xl"><td>Total Debit</td><td class="text-right font-bold">48,304,763</td></tr>
                <tr class="bg-teal-900 text-white p-4 rounded-xl"><td>Saldo Akhir</td><td class="text-right font-bold">15,711,218</td></tr>
            </table>
        </div>

        <!-- Form Input -->
        <div id="input-section" class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
            <h3 class="font-bold text-xl mb-6 text-teal-900">Input Transaksi Baru</h3>
            <form id="form-transaksi" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <input type="text" id="ket" placeholder="Keterangan" required class="p-4 bg-slate-50 rounded-xl border">
                <input type="number" id="jml" placeholder="Jumlah" required class="p-4 bg-slate-50 rounded-xl border">
                <button type="submit" id="btn-save" class="bg-teal-700 text-white rounded-xl font-bold hover:bg-teal-800 transition">SIMPAN DATA</button>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('form-transaksi').onsubmit = (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-save');
            btn.innerText = "MENGIRIM...";
            fetch("URL_WEB_APP_ANDA", {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    keterangan: document.getElementById('ket').value,
                    jumlah: document.getElementById('jml').value
                })
            }).then(() => {
                alert("Data Berhasil Disimpan!");
                btn.innerText = "SIMPAN DATA";
                document.getElementById('form-transaksi').reset();
            });
        };
    </script>
</body>
</html>
