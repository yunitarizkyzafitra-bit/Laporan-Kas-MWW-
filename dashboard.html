<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Profesional - MWW Sulteng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        if (!sessionStorage.getItem("isLoggedIn")) window.location.href = "index.html";
        const API_URL = "https://script.google.com/macros/s/AKfycby68xilln-CGWbFx0krG_rOBD1iv07_Ylz6fB4qYrDeVpwAnqBIkUihYa8r0Px46Lj8lg/exec";
    </script>
</head>
<body class="bg-slate-50 flex min-h-screen">
    <aside class="w-72 bg-teal-800 text-white p-8 flex flex-col shadow-2xl">
        <div class="text-center mb-12">
            <img src="https://raw.githubusercontent.com/yunitarizkyzafitra-bit/Laporan-Kas-MWW-/main/logo-mww.png" class="w-20 mx-auto mb-4 bg-white p-2 rounded-2xl shadow-xl">
            <h2 class="font-bold text-lg">MWW Sulteng</h2>
        </div>
        <nav class="space-y-3 flex-grow">
            <a href="#" class="block p-4 bg-teal-900 rounded-2xl font-semibold"><i class="fa fa-chart-line mr-3"></i> Dashboard</a>
            <a href="#input-section" class="block p-4 hover:bg-teal-700 rounded-2xl transition"><i class="fa fa-plus-circle mr-3"></i> Tambah Kas</a>
        </nav>
        <button onclick="sessionStorage.clear(); window.location.href='index.html';" class="text-red-300 hover:text-white transition mt-auto"><i class="fa fa-sign-out mr-2"></i> Logout</button>
    </aside>

    <main class="flex-1 p-10">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold text-teal-950">Laporan Kas MWW</h1>
            <button onclick="exportPDF()" class="bg-teal-900 text-white px-6 py-3 rounded-xl hover:bg-teal-800 transition"><i class="fa fa-file-pdf mr-2"></i> Export PDF</button>
        </div>

        <div class="mb-6">
            <select id="bulanFilter" onchange="updateDashboard()" class="p-3 bg-white border border-teal-200 rounded-xl text-teal-900 font-bold cursor-pointer">
                <option value="5">Mei 2026</option>
                <option value="6">Juni 2026</option>
            </select>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                <table class="w-full text-left border-separate border-spacing-y-4">
                    <tr><td>Saldo Awal</td><td id="val-awal" class="text-right font-bold">16,152,981</td></tr>
                    <tr class="text-green-700"><td>Total Kredit</td><td id="val-kredit" class="text-right font-bold">47,863,000</td></tr>
                    <tr class="text-red-700"><td>Total Debit</td><td id="val-debit" class="text-right font-bold">48,304,763</td></tr>
                    <tr class="bg-teal-900 text-white p-4 rounded-xl"><td>Saldo Akhir</td><td id="val-akhir" class="text-right font-bold">15,711,218</td></tr>
                </table>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                <canvas id="kasChart"></canvas>
            </div>
        </div>

        <div id="input-section" class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
            <h3 class="font-bold text-xl mb-6 text-teal-900">Input Transaksi Baru</h3>
            <form id="form-transaksi" class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <input type="date" id="tgl" required class="p-4 bg-slate-50 rounded-xl border">
                <input type="text" id="ket" placeholder="Keterangan" required class="p-4 bg-slate-50 rounded-xl border">
                <select id="jenis" class="p-4 bg-slate-50 rounded-xl border"><option value="Kredit">Kredit</option><option value="Debit">Debit</option></select>
                <button type="submit" id="btn-save" class="bg-teal-700 text-white rounded-xl font-bold hover:bg-teal-800 transition">SIMPAN DATA</button>
            </form>
        </div>
    </main>

    <script>
        const ctx = document.getElementById('kasChart').getContext('2d');
        let kasChart = new Chart(ctx, { type: 'bar', data: { labels: ['Kredit', 'Debit'], datasets: [{ data: [47863000, 48304763], backgroundColor: ['#15803d', '#be123c'] }] } });

        async function updateDashboard() {
            const bulan = document.getElementById('bulanFilter').value;
            const res = await fetch(`${API_URL}?bulan=${bulan}`);
            const data = await res.json();
            document.getElementById('val-awal').innerText = data.saldoAwal;
            document.getElementById('val-kredit').innerText = data.totalKredit;
            document.getElementById('val-debit').innerText = data.totalDebit;
            document.getElementById('val-akhir').innerText = data.saldoAkhir;
            kasChart.data.datasets[0].data = [data.totalKredit, data.totalDebit];
            kasChart.update();
        }

        document.getElementById('form-transaksi').onsubmit = (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-save');
            btn.innerText = "MENGIRIM...";
            fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    tgl: document.getElementById('tgl').value,
                    ket: document.getElementById('ket').value,
                    jenis: document.getElementById('jenis').value,
                    jml: document.getElementById('jml').value
                })
            }).then(() => {
                alert("Data Berhasil Disimpan!");
                btn.innerText = "SIMPAN DATA";
                document.getElementById('form-transaksi').reset();
                updateDashboard();
            });
        };

        async function exportPDF() {
            const { jsPDF } = window.jspdf;
            const canvas = await html2canvas(document.querySelector('main'));
            const pdf = new jsPDF('p', 'mm', 'a4');
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, 297);
            pdf.save("Laporan_Kas.pdf");
        }
    </script>
</body>
</html>
