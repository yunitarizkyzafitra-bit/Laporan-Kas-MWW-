<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Aplikasi Kas MWW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen">

    <nav class="bg-teal-700 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg">Kas DPW Muslimah Wahdah</h1>
            <button onclick="window.location.href='index.html'" class="text-sm bg-teal-800 px-4 py-2 rounded-lg hover:bg-teal-900">Logout</button>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-slate-500 text-sm font-semibold">Total Saldo</h2>
                <p class="text-2xl font-bold text-teal-700 mt-2">Rp 5.000.000</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-slate-500 text-sm font-semibold">Pemasukan Bulan Ini</h2>
                <p class="text-2xl font-bold text-green-600 mt-2">Rp 1.200.000</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-slate-500 text-sm font-semibold">Pengeluaran Bulan Ini</h2>
                <p class="text-2xl font-bold text-red-600 mt-2">Rp 800.000</p>
            </div>
        </div>

        <div class="mt-8 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <h3 class="font-bold text-lg mb-4">Riwayat Transaksi</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-slate-400 text-xs uppercase border-b">
                            <th class="pb-3">Tanggal</th>
                            <th class="pb-3">Keterangan</th>
                            <th class="pb-3">Jumlah</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="border-b">
                            <td class="py-4">12/07/2026</td>
                            <td class="py-4">Infaq Anggota</td>
                            <td class="py-4 text-green-600 font-bold">+ Rp 100.000</td>
                        </tr>
                        <tr class="border-b">
                            <td class="py-4">10/07/2026</td>
                            <td class="py-4">Pembelian ATK</td>
                            <td class="py-4 text-red-600 font-bold">- Rp 50.000</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
